# Configuração nginx para o servidor host (timecrax.ipb.pt)
# Adicionar ao arquivo de site do nginx no servidor (ex: /etc/nginx/sites-available/timecrax)
#
# Estratégia: o proxy roteia as rotas de API para o container do backend (porta 5139)
# e o restante para o container do frontend (porta 80 ou a porta mapeada no host).
#
# Ajustar os caminhos de SSL conforme o certificado instalado no servidor.

server {
    listen 80;
    server_name timecrax.ipb.pt;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name timecrax.ipb.pt;

    ssl_certificate     /etc/ssl/certs/timecrax.ipb.pt.crt;
    ssl_certificate_key /etc/ssl/private/timecrax.ipb.pt.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Rotas da API — encaminha para o container backend
    location ~ ^/(auth|me|themes|theme-assets|legal|media|health)(/|$) {
        proxy_pass         http://localhost:5139;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend — encaminha para o container do timecrax-web
    # Substituir 80 pela porta real mapeada no host para o container do frontend
    location / {
        proxy_pass         http://localhost:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
